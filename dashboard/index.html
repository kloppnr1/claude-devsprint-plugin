<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevSprint</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f1f5;
    --bg2: #e8e9ef;
    --white: #ffffff;
    --card: #ffffff;
    --border: #d4d6e0;
    --border-light: #e2e4ec;
    --text: #111318;
    --text2: #3d4055;
    --dim: #6b6f85;
    --mute: #9ca0b4;
    --indigo: #4338ca;
    --indigo-light: rgba(67,56,202,0.07);
    --green: #059669;
    --green-light: rgba(5,150,105,0.08);
    --red: #dc2626;
    --red-light: rgba(220,38,38,0.07);
    --amber: #d97706;
    --amber-light: rgba(217,119,6,0.08);
    --blue: #2563eb;
    --blue-light: rgba(37,99,235,0.07);
    --purple: #7c3aed;
    --purple-light: rgba(124,58,237,0.07);
    --cyan: #0891b2;
    --cyan-light: rgba(8,145,178,0.07);
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Outfit', system-ui, sans-serif;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-lg: 0 8px 24px rgba(0,0,0,0.1);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: var(--sans); background: var(--bg); color: var(--text);
    font-size: 13px; line-height: 1.5; -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  /* ── Top Bar ── */
  .topbar {
    background: rgba(255,255,255,0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 28px; height: 52px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .topbar-l { display: flex; align-items: center; gap: 20px; }
  .brand {
    font-family: var(--mono); font-size: 14px; font-weight: 700;
    letter-spacing: -0.5px; color: var(--indigo);
    letter-spacing: -0.5px;
  }
  .sprint-info { display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--dim); }
  .sprint-info .name { color: var(--text2); font-weight: 600; }
  .btn-refresh {
    background: transparent; border: 1px solid var(--border); color: var(--dim);
    padding: 6px 16px; border-radius: 6px; cursor: pointer;
    font-size: 11px; font-family: var(--mono); font-weight: 500;
    transition: all 0.2s;
  }
  .btn-refresh:hover { border-color: var(--indigo); color: var(--indigo); background: var(--indigo-light); }

  /* ── Shell ── */
  .shell { max-width: 980px; margin: 0 auto; padding: 24px 28px 60px; }

  /* ── Agent Banner ── */
  .agent-banner {
    background: var(--indigo-light); border: 1px solid rgba(67,56,202,0.2); border-radius: 10px;
    margin-bottom: 20px; overflow: hidden;
    animation: slideDown 0.3s ease-out;
  }
  @keyframes slideDown { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
  .ab-main { padding: 12px 16px; display: flex; align-items: center; gap: 10px; }
  .agent-banner.idle { background: var(--card); border-color: var(--border); opacity: 0.5; }
  .ab-pulse {
    width: 8px; height: 8px; border-radius: 50%; background: var(--indigo);
    box-shadow: 0 0 8px rgba(67,56,202,0.5);
    animation: livePulse 2s ease-in-out infinite;
  }
  .ab-pulse.idle { background: var(--mute); box-shadow: none; animation: none; }
  .ab-label.idle { color: var(--mute); }
  .agent-banner.done { background: rgba(34,197,94,0.06); border-color: rgba(34,197,94,0.25); }
  .ab-pulse.done { background: #16a34a; box-shadow: 0 0 6px rgba(34,197,94,0.4); animation: none; }
  .ab-label.done { color: #16a34a; }
  @keyframes livePulse { 0%,100%{box-shadow:0 0 8px rgba(67,56,202,0.4)} 50%{box-shadow:0 0 16px rgba(67,56,202,0.1)} }
  .ab-label {
    font-family: var(--mono); font-size: 10px; font-weight: 600;
    color: var(--indigo); letter-spacing: 0.8px; text-transform: uppercase;
  }
  .ab-story { font-size: 13px; font-weight: 600; color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ab-story .id { color: var(--indigo); font-family: var(--mono); font-size: 12px; margin-right: 4px; }
  .ab-time { font-family: var(--mono); font-size: 11px; color: var(--dim); }
  .ab-detail { padding: 0 16px 10px 34px; display: flex; align-items: center; gap: 8px; }
  .ab-step {
    font-family: var(--mono); font-size: 9px; font-weight: 600;
    padding: 2px 8px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.3px;
  }
  .ab-desc { font-size: 11px; color: var(--dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
  .ab-progress { padding: 0 16px 12px 34px; height: 3px; border-radius: 2px; background: var(--border); overflow: hidden; position: relative; }
  .ab-progress .ab-ind { position: absolute; top: 0; left: 0; height: 100%; width: 30%; border-radius: 2px; background: linear-gradient(90deg, transparent, var(--indigo), transparent); animation: abSlide 1.8s ease-in-out infinite; }
  @keyframes abSlide { 0% { left: -30%; } 100% { left: 100%; } }
  .ab-stories { padding: 0 16px 8px 34px; display: flex; flex-direction: column; gap: 3px; }
  .ab-srow { display: flex; align-items: center; gap: 8px; font-size: 11px; }
  .ab-srow .id { color: var(--indigo); font-family: var(--mono); font-size: 10px; min-width: 50px; }
  .ab-srow .name { color: var(--text2); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 200px; }
  .ab-srow .ab-sstep { font-family: var(--mono); font-size: 8px; font-weight: 600; padding: 1px 6px; border-radius: 3px; text-transform: uppercase; letter-spacing: 0.3px; }
  .st-load { background: rgba(107,114,128,0.12); color: #6b7280; }
  .st-analyze { background: rgba(6,182,212,0.12); color: #0891b2; }
  .st-spec { background: rgba(245,158,11,0.12); color: #d97706; }
  .st-devops { background: rgba(59,130,246,0.12); color: #2563eb; }
  .st-done { background: rgba(34,197,94,0.12); color: #16a34a; }
  .st-test { background: rgba(249,115,22,0.12); color: #ea580c; }
  .st-work { background: rgba(139,92,246,0.12); color: #7c3aed; }
  .st-error { background: rgba(239,68,68,0.12); color: #dc2626; }
  .ab-srow .ab-sdesc { color: var(--dim); font-size: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
  @keyframes liveBg { 0%,100%{ background: rgba(67,56,202,0.14); } 50%{ background: rgba(67,56,202,0.04); } }
  .story-row.story-live > * { animation: liveBg 2s ease-in-out infinite; }
  .story-row.story-live > :first-child { box-shadow: inset 3px 0 0 var(--indigo); }

  /* ── Stats ── */
  .stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 24px; }
  .stat {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 18px; box-shadow: var(--shadow);
    transition: border-color 0.2s;
  }
  .stat:hover { border-color: var(--mute); }
  .stat-label {
    font-size: 11px; color: var(--dim); font-weight: 500; margin-bottom: 4px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .stat-val { font-family: var(--mono); font-size: 28px; font-weight: 700; line-height: 1.1; }

  /* ── Repo Card ── */
  .repo-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    margin-bottom: 12px; overflow: hidden; box-shadow: var(--shadow);
    transition: border-color 0.2s;
  }
  .repo-card:hover { border-color: var(--mute); }
  .repo-header {
    padding: 10px 16px; display: flex; align-items: center; gap: 10px;
    background: var(--bg2); border-bottom: 1px solid var(--border);
  }
  .repo-icon { font-size: 14px; opacity: 0.5; }
  .repo-name {
    font-family: var(--mono); font-size: 12px; font-weight: 600;
    color: var(--text); flex: 1;
  }
  .repo-badges { display: flex; gap: 4px; }
  .badge {
    font-family: var(--mono); font-size: 9px; font-weight: 600;
    padding: 2px 7px; border-radius: 4px; letter-spacing: 0.2px;
  }
  .badge-count { background: var(--indigo-light); color: var(--indigo); }
  .badge-branch { background: var(--purple-light); color: var(--purple); }
  .badge-dirty { background: var(--amber-light); color: var(--amber); }

  /* ── Story Grid ── */
  .story-grid {
    display: grid;
    grid-template-columns: 60px 1fr 90px 110px 68px;
    align-items: center;
  }
  .story-row {
    display: contents;
    cursor: pointer;
  }
  .story-row > * {
    padding: 10px 5px;
    border-bottom: 1px solid var(--border-light);
    transition: background 0.1s;
    display: flex; align-items: center; align-self: stretch;
  }
  .story-row > :first-child { padding-left: 16px; }
  .story-row > :last-child { padding-right: 16px; }
  .story-row:hover > * { background: rgba(0,0,0,0.02); }
  .story-row .btn-exec {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    opacity: 0; transition: opacity 0.15s; z-index: 2;
  }
  .story-row:hover .btn-exec { opacity: 1; }
  .s-title-cell {
    position: relative; display: flex; align-items: center; min-width: 0;
  }
  .s-id {
    font-family: var(--mono); font-size: 10px; color: var(--mute);
  }
  .s-title {
    font-size: 13px; font-weight: 400; color: var(--text2);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .story-row:hover .s-title { color: var(--text); }
  /* Inline indicators */
  .s-indicators { display: flex; align-items: center; gap: 4px; justify-content: flex-end; }
  .ind {
    font-family: var(--mono); font-size: 8px; font-weight: 600;
    padding: 2px 6px; border-radius: 3px; letter-spacing: 0.3px;
    text-transform: uppercase; white-space: nowrap;
  }
  .ind-live { background: var(--indigo-light); color: var(--indigo); }
  .ind-planned { background: var(--purple-light); color: var(--purple); }
  .ind-pr-active { background: var(--blue-light); color: var(--blue); }
  .ind-pr-merged { background: var(--green-light); color: var(--green); }
  .ind-pr-rejected { background: var(--red-light); color: var(--red); }
  .ind-done { background: var(--green-light); color: var(--green); }
  .ind-partial { background: var(--amber-light); color: var(--amber); }
  .s-state {
    font-family: var(--mono); font-size: 9px; font-weight: 600;
    white-space: nowrap; text-align: right;
  }
  .s-state-tag {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
  }
  .st-new { background: var(--cyan-light); color: var(--cyan); }
  .st-active { background: var(--blue-light); color: var(--blue); }
  .st-resolved { background: var(--green-light); color: var(--green); }
  .st-closed { background: var(--green-light); color: var(--green); }
  .st-removed { background: var(--red-light); color: var(--red); }

  /* ── Story Detail (expanded) ── */
  .story-detail {
    grid-column: 1 / -1;
    padding: 10px 16px 12px 64px; background: var(--bg2);
    border-bottom: 1px solid var(--border);
  }
  .detail-sec { margin-bottom: 8px; }
  .detail-sec:last-child { margin-bottom: 0; }
  .detail-label {
    font-family: var(--mono); font-size: 9px; font-weight: 600;
    color: var(--mute); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 2px;
  }
  .detail-row {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--text2); padding: 2px 0;
  }
  .d-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .d-dot-green { background: var(--green); box-shadow: 0 0 6px rgba(52,211,153,0.4); }
  .d-dot-amber { background: var(--amber); box-shadow: 0 0 6px rgba(251,191,36,0.4); }
  .d-dot-live { background: var(--indigo); box-shadow: 0 0 6px rgba(67,56,202,0.5); animation: livePulse 2s ease-in-out infinite; }
  .detail-row .txt { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text2); }
  .detail-row .ts { font-family: var(--mono); font-size: 10px; color: var(--mute); flex-shrink: 0; }
  .commit-line { display: flex; align-items: baseline; gap: 6px; font-size: 11px; padding: 2px 0; }
  .c-hash { font-family: var(--mono); font-size: 10px; color: var(--indigo); flex-shrink: 0; opacity: 0.7; }
  .c-msg { color: var(--text2); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .c-date { font-family: var(--mono); font-size: 10px; color: var(--mute); flex-shrink: 0; }
  .pr-line { display: flex; align-items: center; gap: 6px; font-size: 11px; padding: 2px 0; }
  .pr-icon {
    width: 18px; height: 18px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; flex-shrink: 0; font-weight: 600;
  }
  .pri-active { background: var(--blue-light); color: var(--blue); }
  .pri-merged { background: var(--green-light); color: var(--green); }
  .pri-rejected { background: var(--red-light); color: var(--red); }
  .pr-line a { color: var(--blue); text-decoration: none; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .pr-line a:hover { text-decoration: underline; color: var(--indigo); }
  .votes { display: flex; gap: 2px; flex-shrink: 0; }
  .vote {
    width: 16px; height: 16px; border-radius: 50%; font-size: 9px;
    display: flex; align-items: center; justify-content: center; font-weight: 700;
  }
  .v-yes { background: var(--green-light); color: var(--green); }
  .v-no { background: var(--red-light); color: var(--red); }
  .v-wait { background: var(--amber-light); color: var(--amber); }
  .v-none { background: var(--border); color: var(--mute); }

  /* ── History entries ── */
  .hist-row {
    display: grid; grid-template-columns: 140px 1fr auto; gap: 6px; align-items: center;
  }
  .hist-step {
    font-family: var(--mono); font-size: 9px; font-weight: 600;
    padding: 2px 6px; border-radius: 3px; background: var(--border);
    color: var(--dim); text-transform: uppercase; letter-spacing: 0.2px;
    white-space: nowrap; text-align: center;
  }
  .hist-more {
    font-family: var(--mono); font-size: 10px; color: var(--indigo);
    cursor: pointer; padding: 4px 0; user-select: none;
  }
  .hist-more:hover { text-decoration: underline; }

  /* ── Commits Toggle ── */
  .commits-toggle {
    display: flex; align-items: center; gap: 6px; padding: 8px 16px;
    cursor: pointer; user-select: none; border-top: 1px solid var(--border);
    transition: background 0.1s;
  }
  .commits-toggle:hover { background: rgba(0,0,0,0.02); }
  .ct-arrow { font-size: 9px; color: var(--mute); }
  .ct-label { font-size: 11px; font-weight: 500; color: var(--dim); }
  .commits-section { padding: 4px 16px 8px; background: var(--bg2); border-top: 1px solid var(--border); }
  .commit-group-label {
    font-size: 11px; font-weight: 600; color: var(--text2);
    padding: 6px 0 2px; margin-top: 2px;
    border-top: 1px solid var(--border);
  }
  .commit-group-label:first-child { border-top: none; margin-top: 0; }

  /* ── Repo badge on story row ── */
  .s-repo {
    font-family: var(--mono); font-size: 8px; font-weight: 600;
    letter-spacing: 0.2px; white-space: nowrap;
  }
  .s-repo-tag {
    display: inline-block; padding: 2px 8px; border-radius: 3px;
    background: var(--border); color: var(--dim);
  }
  .btn-exec {
    font-family: var(--sans); font-size: 11px; font-weight: 600;
    padding: 5px 14px; border-radius: 6px; border: none;
    background: var(--indigo); color: #ffffff;
    cursor: pointer; white-space: nowrap; transition: all 0.2s;
    box-shadow: 0 0 12px rgba(67,56,202,0.3);
    letter-spacing: 0.1px;
  }
  .btn-exec:hover { background: #3730a3; box-shadow: 0 0 20px rgba(67,56,202,0.5); }
  .btn-exec:disabled { opacity: 0.4; cursor: default; box-shadow: none; }
  .btn-plan {
    font-family: var(--sans); font-size: 11px; font-weight: 600;
    padding: 5px 14px; border-radius: 6px; border: none;
    background: var(--cyan); color: #ffffff;
    cursor: pointer; white-space: nowrap; transition: all 0.2s;
    box-shadow: 0 0 12px rgba(8,145,178,0.3);
    letter-spacing: 0.1px;
  }
  .btn-plan:hover { background: #0e7490; box-shadow: 0 0 20px rgba(8,145,178,0.5); }
  .btn-plan:disabled { opacity: 0.4; cursor: default; box-shadow: none; }
  .story-row .btn-plan {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    opacity: 0; transition: opacity 0.15s; z-index: 2;
  }
  .story-row:hover .btn-plan { opacity: 1; }

  /* ── Question Modal ── */
  .q-progress { padding: 20px; text-align: center; color: var(--dim); }
  .q-progress .q-spinner {
    display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border);
    border-top-color: var(--cyan); border-radius: 50%; animation: qSpin 0.8s linear infinite;
    margin-right: 8px; vertical-align: middle;
  }
  @keyframes qSpin { to { transform: rotate(360deg); } }
  .q-group { margin-bottom: 16px; }
  .q-label { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 6px; }
  .q-input {
    width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px;
    font-family: var(--sans); font-size: 13px; color: var(--text); background: var(--bg);
    transition: border-color 0.2s; resize: vertical;
  }
  .q-input:focus { outline: none; border-color: var(--cyan); }
  .q-choices { display: flex; flex-direction: column; gap: 6px; margin-top: 4px; }
  .q-choice {
    display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text2);
    cursor: pointer; padding: 4px 0;
  }
  .q-choice input[type="radio"] { accent-color: var(--cyan); }
  .btn-submit-answers {
    font-family: var(--mono); font-size: 11px; font-weight: 600;
    padding: 8px 20px; border-radius: 6px; border: none;
    background: var(--cyan); color: #ffffff;
    cursor: pointer; transition: all 0.2s;
    box-shadow: 0 0 12px rgba(8,145,178,0.2);
  }
  .btn-submit-answers:hover { background: #0e7490; box-shadow: 0 0 20px rgba(8,145,178,0.4); }
  .btn-submit-answers:disabled { opacity: 0.4; cursor: default; box-shadow: none; }

  /* ── Spec Panel (overlay) ── */
  .spec-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 200;
    display: flex; justify-content: center; align-items: center;
    animation: fadeOverlay 0.15s ease-out;
  }
  @keyframes fadeOverlay { from { opacity: 0; } to { opacity: 1; } }
  .spec-panel {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    box-shadow: var(--shadow-lg);
    width: 720px; max-height: 85vh; display: flex; flex-direction: column;
    animation: slideUp 0.2s ease-out;
  }
  @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .spec-header {
    padding: 16px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .spec-header-title { font-size: 14px; font-weight: 600; color: var(--text); }
  .spec-close {
    background: none; border: none; font-size: 18px; color: var(--dim);
    cursor: pointer; padding: 4px 8px; border-radius: 4px;
  }
  .spec-close:hover { background: var(--border); color: var(--text); }
  .spec-body {
    padding: 20px; overflow-y: auto; flex: 1;
    font-size: 13px; line-height: 1.7; color: var(--text2);
  }
  .spec-body h1 { font-size: 16px; margin: 0 0 12px; color: var(--text); }
  .spec-body h2 { font-size: 14px; margin: 20px 0 8px; color: var(--text); border-bottom: 1px solid var(--border); padding-bottom: 4px; }
  .spec-body h3 { font-size: 12px; margin: 14px 0 6px; color: var(--text); }
  .spec-body code { font-family: var(--mono); font-size: 11px; background: var(--border); padding: 2px 5px; border-radius: 3px; color: var(--indigo); }
  .spec-body pre { background: var(--bg); padding: 12px 14px; border-radius: 8px; border: 1px solid var(--border); overflow-x: auto; margin: 8px 0; }
  .spec-body pre code { background: none; padding: 0; color: var(--text2); }
  .spec-body ul, .spec-body ol { padding-left: 20px; margin: 6px 0; }
  .spec-body li { margin: 2px 0; }
  .spec-body table { width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 12px; }
  .spec-body th, .spec-body td { padding: 6px 10px; border: 1px solid var(--border); text-align: left; }
  .spec-body th { background: var(--bg2); font-weight: 600; color: var(--text); }
  .spec-body blockquote { border-left: 3px solid var(--indigo); padding: 4px 12px; margin: 8px 0; color: var(--dim); }
  .spec-footer {
    padding: 12px 20px; border-top: 1px solid var(--border);
    display: flex; justify-content: flex-end; gap: 8px;
  }
  .btn-launch {
    font-family: var(--mono); font-size: 11px; font-weight: 600;
    padding: 8px 20px; border-radius: 6px; border: none;
    background: var(--indigo); color: #ffffff;
    cursor: pointer; transition: all 0.2s;
    box-shadow: 0 0 12px rgba(67,56,202,0.2);
  }
  .btn-launch:hover { background: #3730a3; box-shadow: 0 0 20px rgba(67,56,202,0.4); }
  .btn-launch:disabled { opacity: 0.4; cursor: default; box-shadow: none; }
  .btn-cancel {
    font-family: var(--mono); font-size: 11px; font-weight: 500;
    padding: 8px 16px; border-radius: 6px; border: 1px solid var(--border);
    background: transparent; color: var(--text2); cursor: pointer;
  }
  .btn-cancel:hover { background: var(--border); color: var(--text); }

  /* ── Status group header ── */
  .status-header {
    padding: 10px 16px; display: flex; align-items: center; gap: 8px;
    background: var(--bg2); border-bottom: 1px solid var(--border);
  }
  .status-icon { font-size: 12px; opacity: 0.6; }
  .status-label {
    font-family: var(--mono); font-size: 11px; font-weight: 600;
    color: var(--text); flex: 1; letter-spacing: 0.5px; text-transform: uppercase;
  }
  .status-count {
    font-family: var(--mono); font-size: 9px; font-weight: 700;
    padding: 2px 8px; border-radius: 10px; letter-spacing: 0.2px;
  }
  .sg-active .status-label { color: var(--blue); }
  .sg-active .status-count { background: var(--blue-light); color: var(--blue); }
  .sg-planned .status-label { color: var(--cyan); }
  .sg-planned .status-count { background: var(--cyan-light); color: var(--cyan); }
  .sg-blocked .status-label { color: var(--red); }
  .sg-blocked .status-count { background: var(--red-light); color: var(--red); }
  .sg-partial .status-label { color: var(--amber); }
  .sg-partial .status-count { background: var(--amber-light); color: var(--amber); }
  .sg-unplanned .status-label { color: var(--dim); }
  .sg-unplanned .status-count { background: var(--border); color: var(--dim); }
  .sg-done .status-label { color: var(--green); }
  .sg-done .status-count { background: var(--green-light); color: var(--green); }

  /* ── Unlinked stories ── */
  .unlinked-header {
    padding: 10px 16px; background: var(--bg2); border-bottom: 1px solid var(--border);
    font-size: 12px; font-weight: 600; color: var(--dim);
  }

  /* ── Daily Feed ── */
  .daily-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    margin-top: 24px; overflow: hidden; box-shadow: var(--shadow);
  }
  .daily-header {
    padding: 10px 16px; background: var(--bg2); border-bottom: 1px solid var(--border);
    font-size: 11px; font-weight: 600; color: var(--dim);
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .day-group { border-bottom: 1px solid var(--border-light); }
  .day-group:last-child { border-bottom: none; }
  .day-date {
    padding: 8px 16px 2px; font-family: var(--mono); font-size: 11px;
    font-weight: 600; color: var(--text2);
  }
  .day-item {
    display: flex; align-items: center; gap: 8px;
    padding: 3px 16px; font-size: 11px; color: var(--text2);
  }
  .day-item:last-child { padding-bottom: 8px; }
  .day-tag {
    font-family: var(--mono); font-size: 8px; font-weight: 600;
    padding: 2px 6px; border-radius: 3px; text-transform: uppercase;
    letter-spacing: 0.3px; min-width: 44px; text-align: center; flex-shrink: 0;
  }
  .tag-commit { background: var(--blue-light); color: var(--blue); }
  .tag-pr { background: var(--purple-light); color: var(--purple); }
  .tag-exec { background: var(--green-light); color: var(--green); }
  .tag-story { background: var(--amber-light); color: var(--amber); }
  .tag-task { background: var(--cyan-light); color: var(--cyan); }
  .day-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }

  /* ── Utilities ── */
  .loading { display: flex; align-items: center; justify-content: center; padding: 32px; color: var(--dim); font-size: 12px; gap: 8px; }
  .spinner { width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--indigo); border-radius: 50%; animation: spin 0.6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg) } }
  .empty { padding: 20px; text-align: center; color: var(--mute); font-size: 12px; }

  /* ── Entrance ── */
  @keyframes cardIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .repo-card { animation: cardIn 0.3s ease-out both; }
  .repo-card:nth-child(2) { animation-delay: 50ms; }
  .repo-card:nth-child(3) { animation-delay: 100ms; }
  .repo-card:nth-child(4) { animation-delay: 150ms; }
  .repo-card:nth-child(5) { animation-delay: 200ms; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--mute); }

  /* also keep fadeIn for backwards compat */
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-l">
    <span class="brand">DevSprint</span>
    <div class="sprint-info">
      <span class="name" id="sprint-name"></span>
      <span id="sprint-dates"></span>
    </div>
  </div>
  <button class="btn-refresh" onclick="refreshAll()">Opdater</button>
</div>

<div class="shell">
  <div class="agent-banner idle" id="agent-banner">
    <div class="ab-main">
      <div class="ab-pulse idle" id="ab-pulse"></div>
      <span class="ab-label idle" id="ab-label">IDLE</span>
      <span class="ab-story" id="ab-story" style="color:var(--dim)">Ingen aktiv agent</span>
      <span class="ab-time" id="ab-time"></span>
    </div>
    <div id="ab-extra" style="display:none">
      <div class="ab-detail">
        <span class="ab-step" id="ab-step"></span>
        <span class="ab-desc" id="ab-desc"></span>
      </div>
      <div class="ab-stories" id="ab-stories"></div>
      <div class="ab-progress" id="ab-progress"></div>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-label">Stories</div><div class="stat-val" id="s-stories" style="color:var(--indigo)">-</div></div>
    <div class="stat"><div class="stat-label">Afsluttet</div><div class="stat-val" id="s-done" style="color:var(--green)">-</div></div>
    <div class="stat"><div class="stat-label">Aktive PRs</div><div class="stat-val" id="s-prs" style="color:var(--blue)">-</div></div>
    <div class="stat"><div class="stat-label">Repos</div><div class="stat-val" id="s-repos" style="color:var(--purple)">-</div></div>
    <div class="stat"><div class="stat-label">Commits</div><div class="stat-val" id="s-commits" style="color:var(--cyan)">-</div></div>
  </div>

  <div id="main"><div class="loading"><div class="spinner"></div>Henter sprint...</div></div>

  <div class="daily-card">
    <div class="daily-header">Dagsoversigt</div>
    <div id="daily"><div class="loading"><div class="spinner"></div></div></div>
  </div>
</div>

<script>
let S = { sprint:null, git:[], pr:[], map:null, exec:null, agent:null };

const F = url => fetch(url).then(r => r.ok ? r.json() : Promise.reject(r.status));
const E = s => s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : '';
const D = d => { if(!d)return''; const t=new Date(d); return t.toLocaleDateString('da-DK',{day:'numeric',month:'short'})+' '+t.toLocaleTimeString('da-DK',{hour:'2-digit',minute:'2-digit'}); };
const AGO = d => { if(!d)return''; const s=Math.floor((Date.now()-new Date(d).getTime())/1000); if(s<60)return'nu'; if(s<3600)return Math.floor(s/60)+'m siden'; if(s<86400)return Math.floor(s/3600)+'t siden'; return Math.floor(s/86400)+'d siden'; };
const SC = s => { if(!s)return'new'; const l=s.toLowerCase(); return l==='new'?'new':['resolved','closed','done'].includes(l)?'resolved':l==='removed'?'removed':'active'; };

/* ── DOM Helper ── */
function cel(tag, cls, txt) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (txt != null) e.textContent = String(txt);
  return e;
}
function escH(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

/* ── Agent ── */
const EXEC_STEPS=['Pre-flight','Analyze','Baseline','Branch','Activate','Write Tests','Implement','Test','Commit','PR','Resolve','Done'];
const PLAN_STEPS=['Fetch','Load','Check','Resolve','Analyze','Verify','DevOps','Spec','Review','Post','Task Map','Done'];
const execI = s => { if(!s)return 0; const l=s.toLowerCase(); if(/pre.?flight|checking.*state|loading.*spec/.test(l))return 1; if(/baseline|running.*base/.test(l))return 2; if(/branch/.test(l))return 3; if(/activat/.test(l))return 4; if(/writ.*test|red/.test(l))return 5; if(/impl|green|refac/.test(l))return 6; if(/full.*test|running.*test|test.*suite/.test(l))return 7; if(/commit|push/.test(l))return 8; if(/pr|pull/.test(l))return 9; if(/resolv|compl|done/.test(l))return 10; return 0; };
const planI = s => { if(!s)return 0; const l=s.toLowerCase(); if(/fetch|planning/.test(l))return 0; if(/load|stories/.test(l))return 1; if(/check|existing/.test(l))return 2; if(/analy|scan/.test(l))return 4; if(/resolv|repo|detect/.test(l))return 3; if(/verif|understand/.test(l))return 5; if(/post.*devops|post.*comment|adding.*comment/.test(l))return 9; if(/devops|updat.*desc/.test(l))return 6; if(/spec|generat|story\.md/.test(l))return 7; if(/review|await|present/.test(l))return 8; if(/task.?map/.test(l))return 10; if(/done|complete|clear/.test(l))return 11; return 0; };
const isPlanStep = s => { if(!s)return false; const l=s.toLowerCase(); return /planning|fetch.*sprint|load.*stories|check.*exist|resolv.*repo|analy.*repo|scan.*for|verif.*understand|updat.*desc|devops|generat.*spec|story\.md|review|await|present|post.*devops|post.*comment|adding.*comment|task.?map/.test(l); };
const stepI = s => isPlanStep(s) ? planI(s) : execI(s);
const getSteps = s => isPlanStep(s) ? PLAN_STEPS : EXEC_STEPS;

function stepColor(s) {
  if (!s) return 'st-load';
  var l = s.toLowerCase();
  if (/error|fail/i.test(l)) return 'st-error';
  if (/done|complete|finish|resolv.*task|merged/i.test(l)) return 'st-done';
  if (/test|baseline/i.test(l)) return 'st-test';
  if (/implement|writ(?!.*test)|commit|branch|push|code|refactor/i.test(l)) return 'st-work';
  if (/devops|post|comment|task.?map|updat.*desc|pr$|pull.?req|creat.*pr/i.test(l)) return 'st-devops';
  if (/spec|generat|verif.*understand|story\.md|review|present|await/i.test(l)) return 'st-spec';
  if (/analy|scan|pre.?flight|activat/i.test(l)) return 'st-analyze';
  return 'st-load';
}

function renderAgent(d) {
  const banner = document.getElementById('agent-banner');
  const pulse = document.getElementById('ab-pulse');
  const label = document.getElementById('ab-label');
  const story = document.getElementById('ab-story');
  const time = document.getElementById('ab-time');
  const extra = document.getElementById('ab-extra');
  const step = document.getElementById('ab-step');
  const desc = document.getElementById('ab-desc');
  const prog = document.getElementById('ab-progress');

  if (!d || !d.active) {
    banner.className = 'agent-banner idle';
    pulse.className = 'ab-pulse idle';
    label.className = 'ab-label idle';
    label.textContent = 'IDLE';
    story.textContent = 'Ingen aktiv agent';
    story.style.color = 'var(--dim)';
    time.textContent = '';
    extra.style.display = 'none';
    return;
  }

  const a = d.active;
  const stale = a.updatedAt && (Date.now() - new Date(a.updatedAt).getTime()) > 300000;
  const done = a.step && /^(complete|done|finish)/i.test(a.step);

  if (stale) {
    banner.className = 'agent-banner idle';
    pulse.className = 'ab-pulse idle';
    label.className = 'ab-label idle';
    label.textContent = 'STALE';
    story.textContent = a.storyId ? `#${a.storyId} ${a.storyTitle}` : (a.step || '...');
    story.style.color = 'var(--dim)';
    time.textContent = a.updatedAt ? AGO(a.updatedAt) : '';
    extra.style.display = 'none';
    return;
  }

  if (done) {
    banner.className = 'agent-banner done';
    pulse.className = 'ab-pulse done';
    label.className = 'ab-label done';
    label.textContent = 'FÆRDIG';
    story.style.color = '';
    if (a.storyId) {
      story.innerHTML = `<span class="id">#${a.storyId}</span>${E(a.storyTitle)}`;
    } else {
      story.textContent = a.detail || a.step || '...';
    }
    time.textContent = a.startedAt ? AGO(a.startedAt) : '';
    extra.style.display = '';
    step.textContent = a.detail || a.step || '';
    step.className = 'ab-step st-done';
    desc.textContent = '';
    prog.innerHTML = '';
    const storiesEl = document.getElementById('ab-stories');
    storiesEl.style.display = 'none';
    storiesEl.innerHTML = '';
    return;
  }

  banner.className = 'agent-banner';
  pulse.className = 'ab-pulse';
  label.className = 'ab-label';
  label.textContent = 'AKTIV';
  story.style.color = '';
  if (a.storyId) {
    story.innerHTML = `<span class="id">#${a.storyId}</span>${E(a.storyTitle)}`;
  } else {
    story.textContent = a.detail || a.step || '...';
  }
  time.textContent = a.startedAt ? AGO(a.startedAt) : '';
  extra.style.display = '';
  step.textContent = a.step || '';
  step.className = 'ab-step ' + stepColor(a.step);
  desc.textContent = a.storyId ? (a.detail || '') : (a.detail && a.detail !== story.textContent ? a.detail : (a.repo || ''));

  // Per-story rows
  const storiesEl = document.getElementById('ab-stories');
  const storyMap = a.stories || {};
  const storyKeys = Object.keys(storyMap);
  if (storyKeys.length > 1) {
    // Multiple stories being tracked — show each as a row
    storiesEl.innerHTML = '';
    story.textContent = storyKeys.length + ' stories';
    step.textContent = '';
    desc.textContent = '';
    storyKeys.forEach(k => {
      const ss = storyMap[k];
      const row = cel('div', 'ab-srow');
      row.appendChild(cel('span', 'id', '#' + ss.storyId));
      row.appendChild(cel('span', 'name', ss.storyTitle || ''));
      row.appendChild(cel('span', 'ab-sstep ' + stepColor(ss.step), ss.step || ''));
      row.appendChild(cel('span', 'ab-sdesc', ss.detail || ''));
      storiesEl.appendChild(row);
    });
    storiesEl.style.display = '';
  } else {
    storiesEl.style.display = 'none';
    storiesEl.innerHTML = '';
  }

  prog.innerHTML = '<div class="ab-ind"></div>';
}

/* ── DOM State ── */
const _dom = { built: false, structKey: '', storyDoms: new Map(), dailyKey: '' };

/* ── Weekday cutoff ── */
function weekdayCutoff(n) {
  const d = new Date(); d.setHours(0,0,0,0);
  let count = 0;
  while (count < n) { d.setDate(d.getDate() - 1); const day = d.getDay(); if (day !== 0 && day !== 6) count++; }
  return d;
}

/* ── Spec Panel ── */
function renderMarkdown(md) {
  // Minimal markdown→HTML: headers, bold, code, lists, tables, blockquotes
  let html = md
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<b>$1</b>')
    .replace(/^- \[ \] (.+)$/gm, '<li>\u2610 $1</li>')
    .replace(/^- \[x\] (.+)$/gm, '<li>\u2611 $1</li>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/^(\d+)\. (.+)$/gm, '<li>$1. $2</li>')
    .replace(/(<li>.*<\/li>\n?)+/g, function(m) { return '<ul>' + m + '</ul>'; })
    .replace(/\n{2,}/g, '<br><br>')
    .replace(/\n/g, '<br>');
  // Tables
  html = html.replace(/(\|.+\|(<br>)?)+/g, function(block) {
    const rows = block.split(/<br>/).filter(r => r.trim() && !r.match(/^\|[-|: ]+\|$/));
    if (rows.length < 1) return block;
    let t = '<table>';
    rows.forEach((r, i) => {
      const cells = r.split('|').filter(c => c.trim() !== '');
      const tag = i === 0 ? 'th' : 'td';
      t += '<tr>' + cells.map(c => '<' + tag + '>' + c.trim() + '</' + tag + '>').join('') + '</tr>';
    });
    return t + '</table>';
  });
  return html;
}

function openSpecPanel(storyId, title) {
  const overlay = cel('div', 'spec-overlay');
  const panel = cel('div', 'spec-panel');

  const header = cel('div', 'spec-header');
  header.appendChild(cel('span', 'spec-header-title', '#' + storyId + ' \u2014 ' + title));
  const closeBtn = cel('button', 'spec-close', '\u2715');
  closeBtn.onclick = function() { overlay.remove(); };
  header.appendChild(closeBtn);
  panel.appendChild(header);

  const body = cel('div', 'spec-body');
  body.textContent = 'Henter plan\u2026';
  panel.appendChild(body);

  const footer = cel('div', 'spec-footer');
  const cancelBtn = cel('button', 'btn-cancel', 'Luk');
  cancelBtn.onclick = function() { overlay.remove(); };
  const launchBtn = cel('button', 'btn-launch', '\u25B6 Start execution');
  launchBtn.disabled = true;
  launchBtn.onclick = function() {
    launchBtn.disabled = true; launchBtn.textContent = 'Starter\u2026';
    fetch('/api/execute', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({storyId: storyId}) })
      .then(r => r.json()).then(() => { launchBtn.textContent = 'Startet \u2713'; setTimeout(() => overlay.remove(), 1000); })
      .catch(() => { launchBtn.disabled = false; launchBtn.textContent = '\u25B6 Start execution'; });
  };
  footer.appendChild(cancelBtn);
  footer.appendChild(launchBtn);
  panel.appendChild(footer);

  overlay.appendChild(panel);
  overlay.onclick = function(e) { if (e.target === overlay) overlay.remove(); };
  document.body.appendChild(overlay);

  fetch('/api/story-spec?id=' + storyId)
    .then(r => { if (!r.ok) throw new Error('Not found'); return r.json(); })
    .then(d => { body.innerHTML = renderMarkdown(d.markdown); launchBtn.disabled = false; })
    .catch(() => { body.textContent = 'Ingen plan fundet. K\u00f8r /devsprint-plan ' + storyId + ' f\u00f8rst.'; });
}

/* ── Plan launch + question/answer flow ── */
var _activePlans = {};
function launchPlan(storyId, title) {
  if (_activePlans[storyId]) return;
  _activePlans[storyId] = true;
  fetch('/api/plan', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({storyId: storyId}) })
    .then(r => r.json())
    .then(() => {
      // Brief toast notification
      const toast = cel('div', '');
      toast.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--cyan);color:#fff;padding:10px 24px;border-radius:8px;font-family:var(--mono);font-size:12px;font-weight:600;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,0.15);';
      toast.textContent = 'Analyse startet for #' + storyId;
      document.body.appendChild(toast);
      setTimeout(() => { toast.remove(); delete _activePlans[storyId]; }, 3000);
    })
    .catch(() => { delete _activePlans[storyId]; });
  return;
}

function showQuestions(body, footer, storyId, qData, onAnswered) {
  body.innerHTML = '';
  const qs = qData.questions || [];
  if (!qs.length) {
    body.innerHTML = '<div class="q-progress">Ingen sp\u00f8rgsm\u00e5l fra agenten.</div>';
    return;
  }

  qs.forEach(function(q) {
    const group = cel('div', 'q-group');
    group.appendChild(cel('div', 'q-label', q.text));

    if (q.type === 'choice' && q.options && q.options.length) {
      const choices = cel('div', 'q-choices');
      q.options.forEach(function(opt) {
        const label = cel('label', 'q-choice');
        const radio = document.createElement('input');
        radio.type = 'radio'; radio.name = 'q_' + q.id; radio.value = opt;
        label.appendChild(radio);
        label.appendChild(document.createTextNode(opt));
        choices.appendChild(label);
      });
      group.appendChild(choices);
    } else {
      const input = document.createElement('textarea');
      input.className = 'q-input';
      input.rows = 2;
      input.dataset.qid = q.id;
      input.placeholder = 'Skriv dit svar\u2026';
      group.appendChild(input);
    }
    body.appendChild(group);
  });

  // Add submit button to footer
  var existing = footer.querySelector('.btn-submit-answers');
  if (existing) existing.remove();
  const submitBtn = cel('button', 'btn-submit-answers', 'Send svar');
  submitBtn.onclick = function() {
    submitBtn.disabled = true; submitBtn.textContent = 'Sender\u2026';
    const answers = qs.map(function(q) {
      if (q.type === 'choice') {
        const checked = body.querySelector('input[name="q_' + q.id + '"]:checked');
        return { id: q.id, answer: checked ? checked.value : '' };
      } else {
        const ta = body.querySelector('[data-qid="' + q.id + '"]');
        return { id: q.id, answer: ta ? ta.value : '' };
      }
    });
    fetch('/api/answers/' + storyId, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ storyId: Number(storyId), storyTitle: qData.storyTitle || '', answers: answers })
    })
    .then(r => r.json())
    .then(() => { if (onAnswered) onAnswered(); })
    .catch(() => { submitBtn.disabled = false; submitBtn.textContent = 'Send svar'; });
  };
  footer.appendChild(submitBtn);
}

/* ── Toggle helpers ── */
function togDetail(el) {
  const d = el.nextElementSibling;
  if (d && d.classList.contains('story-detail')) d.style.display = d.style.display === 'none' ? 'block' : 'none';
}

/* ── Save/restore toggle states across structural rebuilds ── */
function saveToggles(container) {
  const st = {};
  container.querySelectorAll('[data-story-detail]').forEach(el => {
    if (el.style.display !== 'none') st['d' + el.dataset.storyDetail] = 1;
  });
  container.querySelectorAll('.commits-section').forEach(el => {
    if (el.style.display !== 'none') st['c' + el.id] = 1;
  });
  return st;
}
function restoreToggles(container, st) {
  for (const k of Object.keys(st)) {
    if (k[0] === 'd') {
      const el = container.querySelector('[data-story-detail="' + k.slice(1) + '"]');
      if (el) el.style.display = 'block';
    } else if (k[0] === 'c') {
      const el = container.querySelector('#' + k.slice(1));
      if (el) { el.style.display = ''; const t = el.previousElementSibling; if (t) { const a = t.querySelector('.ct-arrow'); if (a) a.textContent = '\u25BC'; } }
    }
  }
}

/* ── Fill story indicator badges ── */
function fillIndicators(el, s, ctx) {
  while (el.firstChild) el.removeChild(el.firstChild);
  const { exM, prM, ag, plannedIds } = ctx;
  const live = ag && ag.active && ag.active.storyId === s.id;
  const ex = exM[s.id], pr = prM[s.id], planned = plannedIds.has(s.id);
  if (live) el.appendChild(cel('span', 'ind ind-live', 'Live'));
  if (planned && !ex) el.appendChild(cel('span', 'ind ind-planned', 'Planned'));
  if (pr) {
    if (pr.prStatus === 'completed') el.appendChild(cel('span', 'ind ind-pr-merged', 'PR merged'));
    else if (pr.prStatus === 'abandoned') el.appendChild(cel('span', 'ind ind-pr-rejected', 'PR lukket'));
    else el.appendChild(cel('span', 'ind ind-pr-active', 'PR aktiv'));
  }
  if (ex && !pr) {
    el.appendChild(cel('span', ex.status === 'completed' ? 'ind ind-done' : 'ind ind-partial', ex.status === 'completed' ? 'F\u00e6rdig' : 'Delvis'));
  }
}

/* ── Build a story row + detail panel (DOM, no innerHTML) ── */
function buildStoryRow(s, ctx) {
  const { exM, prM, ag, sRM } = ctx;
  const ex = exM[s.id], pr = prM[s.id];
  const live = ag && ag.active && ag.active.storyId === s.id;
  // History entries for this story from agent-status history
  const hist = ag && ag.history ? ag.history.filter(h => h.storyId === s.id) : [];
  const hasDetail = !!(ex || pr || live || hist.length);

  const row = cel('div', 'story-row');
  row.dataset.storyId = s.id;

  // Col 1: ID
  row.appendChild(cel('span', 's-id', '#' + s.id));

  // Col 2: Title + exec button in a cell wrapper
  const titleCell = cel('div', 's-title-cell');
  titleCell.appendChild(cel('span', 's-title', s.title));
  const cls = classifyStory(s, ctx);
  if (cls === 'unplanned') {
    const planBtn = cel('button', 'btn-plan', 'Analys\u00e9r');
    planBtn.onclick = function(e) {
      e.stopPropagation();
      launchPlan(s.id, s.title);
    };
    titleCell.appendChild(planBtn);
  }
  if (cls === 'planned' || cls === 'partial') {
    const reBtn = cel('button', 'btn-plan', 'Re-analys\u00e9r');
    reBtn.style.right = '108px';
    reBtn.onclick = function(e) {
      e.stopPropagation();
      launchPlan(s.id, s.title);
    };
    titleCell.appendChild(reBtn);
    const btn = cel('button', 'btn-exec', 'Udf\u00f8r plan');
    btn.onclick = function(e) {
      e.stopPropagation();
      openSpecPanel(s.id, s.title);
    };
    titleCell.appendChild(btn);
  }
  row.appendChild(titleCell);

  // Col 3: Indicators
  const inds = cel('span', 's-indicators');
  inds.dataset.storyIndicators = s.id;
  fillIndicators(inds, s, ctx);
  row.appendChild(inds);

  // Col 4: Repo badge
  const repoName = sRM ? sRM[s.id] : null;
  const repoEl = cel('span', 's-repo');
  if (repoName) {
    const tag = cel('span', 's-repo-tag', repoName.replace(/^NewSettlement\./, ''));
    repoEl.appendChild(tag);
  }
  row.appendChild(repoEl);

  // Col 5: State badge
  const sc = SC(s.state);
  const stCls = s.state.toLowerCase() === 'closed' ? 'st-closed' : 'st-' + sc;
  const stateEl = cel('span', 's-state');
  const stateTag = cel('span', 's-state-tag ' + stCls, s.state);
  stateEl.appendChild(stateTag);
  row.appendChild(stateEl);

  // Click handler for expanding details
  if (hasDetail) {
    row.onclick = function() {
      const d = document.querySelector('[data-story-detail="' + s.id + '"]');
      if (d) d.style.display = d.style.display === 'none' ? 'block' : 'none';
    };
  }

  // Detail panel
  const detail = cel('div', 'story-detail');
  detail.dataset.storyDetail = s.id;
  detail.style.display = 'none';

  // Agent sub-section (always present, shown/hidden by updateStoryAgent)
  const agSec = cel('div', 'detail-sec agent-detail');
  agSec.dataset.storyAgent = s.id;
  agSec.style.display = 'none';
  agSec.appendChild(cel('div', 'detail-label', 'Agent'));
  const agRow = cel('div', 'detail-row');
  agRow.appendChild(cel('span', 'd-dot d-dot-live'));
  agRow.appendChild(cel('span', 'txt agent-txt'));
  agRow.appendChild(cel('span', 'ts agent-ts'));
  agSec.appendChild(agRow);
  detail.appendChild(agSec);

  if (ex) {
    const sec = cel('div', 'detail-sec');
    sec.appendChild(cel('div', 'detail-label', 'Execution'));
    const r = cel('div', 'detail-row');
    r.appendChild(cel('span', 'd-dot d-dot-' + (ex.status === 'completed' ? 'green' : 'amber')));
    r.appendChild(cel('span', 'txt', ex.branch || ''));
    r.appendChild(cel('span', 'ts', D(ex.completedAt)));
    sec.appendChild(r);
    if (ex.testsPassed !== undefined) {
      const tr = cel('div', 'detail-row');
      tr.appendChild(cel('span', 'd-dot d-dot-green'));
      const tt = cel('span', 'txt', ex.testsPassed + ' ok' + (ex.testsFailed ? ', ' + ex.testsFailed + ' fejl' : ''));
      tt.style.color = 'var(--green)';
      tr.appendChild(tt);
      sec.appendChild(tr);
    }
    detail.appendChild(sec);
  }

  if (pr) {
    const ps = pr.prStatus === 'completed' ? 'merged' : pr.prStatus === 'abandoned' ? 'rejected' : 'active';
    const ic = ps === 'merged' ? '\u2713' : ps === 'rejected' ? '\u2717' : '\u21BA';
    const sec = cel('div', 'detail-sec');
    sec.appendChild(cel('div', 'detail-label', 'Pull Request'));
    const pl = cel('div', 'pr-line');
    pl.appendChild(cel('span', 'pr-icon pri-' + ps, ic));
    const a = document.createElement('a');
    a.href = pr.prUrl || '#'; a.target = '_blank';
    a.textContent = pr.prTitle || 'PR #' + pr.prId;
    pl.appendChild(a);
    if (pr.reviewers && pr.reviewers.length) {
      const vs = cel('span', 'votes');
      for (const rv of pr.reviewers) {
        let c = 'v-none', ch = '\u2013';
        if (rv.vote === 10) { c = 'v-yes'; ch = '\u2713'; }
        else if (rv.vote === 5) { c = 'v-yes'; ch = '~'; }
        else if (rv.vote === -10) { c = 'v-no'; ch = '\u2717'; }
        else if (rv.vote === -5) { c = 'v-wait'; ch = '?'; }
        const v = cel('span', 'vote ' + c, ch);
        v.title = rv.name || '';
        vs.appendChild(v);
      }
      pl.appendChild(vs);
    }
    sec.appendChild(pl);
    detail.appendChild(sec);
  }

  // History section — show devsprint activity for this story
  if (hist.length) {
    const sec = cel('div', 'detail-sec');
    sec.appendChild(cel('div', 'detail-label', 'Historik'));
    const LIMIT = 5;
    const visible = hist.slice(0, LIMIT);
    const overflow = hist.length > LIMIT;
    for (const h of visible) {
      const r = cel('div', 'detail-row hist-row');
      r.appendChild(cel('span', 'hist-step', h.step || ''));
      r.appendChild(cel('span', 'txt', h.detail || ''));
      r.appendChild(cel('span', 'ts', D(h.startedAt)));
      sec.appendChild(r);
    }
    if (overflow) {
      const moreBtn = cel('div', 'hist-more', '\u25B6 Vis alle (' + hist.length + ')');
      const moreSection = cel('div', 'hist-overflow');
      moreSection.style.display = 'none';
      for (const h of hist.slice(LIMIT)) {
        const r = cel('div', 'detail-row hist-row');
        r.appendChild(cel('span', 'hist-step', h.step || ''));
        r.appendChild(cel('span', 'txt', h.detail || ''));
        r.appendChild(cel('span', 'ts', D(h.startedAt)));
        moreSection.appendChild(r);
      }
      moreBtn.onclick = function(e) {
        e.stopPropagation();
        const show = moreSection.style.display === 'none';
        moreSection.style.display = show ? '' : 'none';
        moreBtn.textContent = show ? '\u25BC Skjul' : '\u25B6 Vis alle (' + hist.length + ')';
      };
      sec.appendChild(moreBtn);
      sec.appendChild(moreSection);
    }
    detail.appendChild(sec);
  }

  return { row, detail, inds, stateEl };
}

/* ── Update existing story row DOM (fast path) ── */
function updateStoryDom(sd, s, ctx) {
  const sc = SC(s.state);
  const stCls = s.state.toLowerCase() === 'closed' ? 'st-closed' : 'st-' + sc;
  const tag = sd.stateEl.querySelector('.s-state-tag');
  if (tag) { tag.className = 's-state-tag ' + stCls; tag.textContent = s.state; }
  fillIndicators(sd.inds, s, ctx);
}

/* ── Build commits section (DOM, no innerHTML) ── */
function buildCommits(git, repoStories, repoId, cutoff) {
  const frag = document.createDocumentFragment();
  const all = (git.commits || []).filter(c => c.subject && !c.subject.startsWith('Merge ') && !c.subject.startsWith('WIP on ') && !c.subject.startsWith('index on ') && !c.subject.startsWith('untracked files on ') && new Date(c.date) >= cutoff);
  if (!all.length) return frag;

  const grouped = {}, unlinked = [];
  for (const c of all) {
    let m = false;
    for (const s of repoStories) { if (c.subject.includes('#' + s.id)) { (grouped[s.id] = grouped[s.id] || { story: s, commits: [] }).commits.push(c); m = true; break; } }
    if (!m) unlinked.push(c);
  }

  function addSection(labelText, labelStyle, sectionId, commitList, groupData) {
    const toggle = cel('div', 'commits-toggle');
    const arrow = cel('span', 'ct-arrow', '\u25B6');
    const label = cel('span', 'ct-label', labelText);
    if (labelStyle) label.style.color = labelStyle;
    toggle.appendChild(arrow); toggle.appendChild(label);
    const section = cel('div', 'commits-section');
    section.id = sectionId; section.style.display = 'none';
    toggle.onclick = function() {
      const show = section.style.display === 'none';
      section.style.display = show ? '' : 'none';
      arrow.textContent = show ? '\u25BC' : '\u25B6';
    };
    if (groupData) {
      for (const id of Object.keys(groupData)) {
        const g = groupData[id];
        section.appendChild(cel('div', 'commit-group-label', '#' + g.story.id + ' ' + g.story.title));
        for (const c of g.commits) {
          const ln = cel('div', 'commit-line');
          ln.appendChild(cel('span', 'c-hash', c.hash ? c.hash.substring(0, 7) : ''));
          ln.appendChild(cel('span', 'c-msg', c.subject));
          ln.appendChild(cel('span', 'c-date', D(c.date)));
          section.appendChild(ln);
        }
      }
    } else {
      for (const c of commitList) {
        const ln = cel('div', 'commit-line');
        ln.appendChild(cel('span', 'c-hash', c.hash ? c.hash.substring(0, 7) : ''));
        ln.appendChild(cel('span', 'c-msg', c.subject));
        ln.appendChild(cel('span', 'c-date', D(c.date)));
        section.appendChild(ln);
      }
    }
    frag.appendChild(toggle); frag.appendChild(section);
  }

  const linked = Object.keys(grouped);
  if (linked.length) {
    const cnt = linked.reduce((n, id) => n + grouped[id].commits.length, 0);
    addSection('Commits (' + cnt + ')', null, 'commits-' + repoId, null, grouped);
  }
  if (unlinked.length) addSection('Andre commits (' + unlinked.length + ')', 'var(--mute)', 'other-' + repoId, unlinked, null);
  return frag;
}

/* ── Classify a story into a status group based on devsprint workflow ── */
function classifyStory(s, ctx) {
  const { exM, ag, plannedIds, isDone } = ctx;
  // DevOps state overrides: if Resolved/Closed/Done in DevOps, it's done
  if (isDone(s)) return 'done';
  // Blocked — title contains BLOKERET, or execution was skipped due to blocker
  if (s.title && s.title.toUpperCase().includes('BLOKERET')) return 'blocked';
  const ex = exM[s.id];
  if (ex && ex.status === 'skipped') return 'blocked';
  // Live — agent is currently working on it
  if (ag && ag.active) {
    const stories = ag.active.stories || {};
    if (ag.active.storyId === s.id || stories[String(s.id)]) return 'live';
  }
  // Completed — execution log says completed
  if (ex && ex.status === 'completed') return 'done';
  // Partial — execution log says partial
  if (ex && ex.status === 'partial') return 'partial';
  // Planned — in task map with tasks but not executed
  if (plannedIds.has(s.id)) return 'planned';
  // Not planned — in sprint but not in task map
  return 'unplanned';
}

/* ── Build entire main board DOM ── */
function buildMainDOM(mainEl, statusGroups, ctx) {
  const { gitM, sRM } = ctx;
  while (mainEl.firstChild) mainEl.removeChild(mainEl.firstChild);
  _dom.storyDoms.clear();

  const groupMeta = {
    live:      { label: 'I gang',        icon: '\u25B6', css: 'sg-active'  },
    partial:   { label: 'Delvis',        icon: '\u25D4', css: 'sg-partial' },
    planned:   { label: 'Planlagt',      icon: '\u25CB', css: 'sg-planned' },
    unplanned: { label: 'Ikke planlagt', icon: '\u2013', css: 'sg-unplanned' },
    blocked:   { label: 'Blokeret',      icon: '\u2298', css: 'sg-blocked' },
    done:      { label: 'Afsluttet',     icon: '\u2713', css: 'sg-done'    },
  };
  const groupOrder = ['live', 'partial', 'planned', 'unplanned', 'blocked', 'done'];

  for (const key of groupOrder) {
    const stories = statusGroups[key] || [];
    if (!stories.length) continue;
    const meta = groupMeta[key];

    const card = cel('div', 'repo-card');

    const header = cel('div', 'status-header ' + meta.css);
    header.appendChild(cel('span', 'status-icon', meta.icon));
    header.appendChild(cel('span', 'status-label', meta.label));
    header.appendChild(cel('span', 'status-count', String(stories.length)));
    card.appendChild(header);

    if (key === 'done') {
      // Completed stories — collapsed by default
      const toggle = cel('div', 'commits-toggle');
      const arrow = cel('span', 'ct-arrow', '\u25B6');
      const label = cel('span', 'ct-label', stories.length + ' afsluttede stories');
      label.style.color = 'var(--green)';
      toggle.appendChild(arrow); toggle.appendChild(label);
      const section = cel('div', 'commits-section');
      section.id = 'done-all'; section.style.display = 'none';
      const doneGrid = cel('div', 'story-grid');
      doneGrid.style.opacity = '0.55';
      for (const s of stories) {
        const sd = buildStoryRow(s, ctx);
        doneGrid.appendChild(sd.row); doneGrid.appendChild(sd.detail);
        _dom.storyDoms.set(s.id, sd);
      }
      section.appendChild(doneGrid);
      toggle.onclick = function() {
        const show = section.style.display === 'none';
        section.style.display = show ? '' : 'none';
        arrow.textContent = show ? '\u25BC' : '\u25B6';
      };
      card.appendChild(toggle);
      card.appendChild(section);
    } else {
      const grid = cel('div', 'story-grid');
      for (const s of stories) {
        const sd = buildStoryRow(s, ctx);
        grid.appendChild(sd.row); grid.appendChild(sd.detail);
        _dom.storyDoms.set(s.id, sd);
      }
      card.appendChild(grid);
    }

    mainEl.appendChild(card);
  }
}

/* ── Main Board ── */
function renderMain() {
  const mainEl = document.getElementById('main');
  if (!S.sprint || !S.sprint.items) {
    if (!_dom.built) mainEl.textContent = 'Venter p\u00e5 data\u2026';
    return;
  }
  const sp = S.sprint;

  if (sp.sprint) {
    document.getElementById('sprint-name').textContent = sp.sprint.name || '';
    if (sp.sprint.startDate && sp.sprint.finishDate) {
      const a = new Date(sp.sprint.startDate).toLocaleDateString('da-DK', {day:'numeric', month:'short'});
      const b = new Date(sp.sprint.finishDate).toLocaleDateString('da-DK', {day:'numeric', month:'short'});
      document.getElementById('sprint-dates').textContent = a + ' \u2013 ' + b;
    }
  }

  const stories = sp.items.filter(i => i.type === 'User Story' || i.type === 'Bug');
  const exM = {}; if (S.exec && S.exec.executions) for (const x of S.exec.executions) exM[x.storyId] = x;
  const prM = {}; for (const p of S.pr) prM[p.storyId] = p;
  const gitM = {}; for (const r of S.git) gitM[r.repoName] = r;
  const sRM = {}; if (S.map && S.map.mappings) for (const m of S.map.mappings) if (m.repoPath) sRM[m.storyId] = m.repoPath.replace(/\\/g, '/').split('/').pop();

  const isDone = s => ['resolved', 'closed', 'done'].includes((s.state || '').toLowerCase());
  const allR = new Set(); if (S.map && S.map.mappings) for (const m of S.map.mappings) if (m.repoPath) allR.add(m.repoPath.replace(/\\/g, '/').split('/').pop());

  document.getElementById('s-stories').textContent = stories.length;
  document.getElementById('s-done').textContent = stories.filter(isDone).length;
  document.getElementById('s-prs').textContent = S.pr.filter(p => p.prStatus === 'active').length;
  document.getElementById('s-repos').textContent = allR.size;
  document.getElementById('s-commits').textContent = S.git.reduce((n, r) => n + (r.commits ? r.commits.length : 0), 0);

  const ag = S.agent;
  const plannedIds = new Set();
  if (S.map && S.map.mappings) for (const m of S.map.mappings) if (m.taskIds && m.taskIds.length > 0) plannedIds.add(m.storyId);

  const ctx = { exM, prM, gitM, ag, plannedIds, commitCutoff: weekdayCutoff(3), isDone, sRM };

  // Classify stories into status groups based on devsprint workflow
  const statusGroups = { live: [], partial: [], planned: [], unplanned: [], blocked: [], done: [] };
  for (const s of stories) {
    statusGroups[classifyStory(s, ctx)].push(s);
  }

  // Structure key: which status groups have which stories
  const structKey = JSON.stringify(
    ['live', 'partial', 'planned', 'unplanned', 'blocked', 'done'].map(k => [k, (statusGroups[k] || []).map(s => s.id)])
  );

  if (!_dom.built || structKey !== _dom.structKey) {
    const toggles = _dom.built ? saveToggles(mainEl) : {};
    buildMainDOM(mainEl, statusGroups, ctx);
    if (Object.keys(toggles).length) restoreToggles(mainEl, toggles);
    _dom.built = true;
    _dom.structKey = structKey;
    return;
  }

  // Fast path: only update states + badges (no DOM rebuild)
  for (const s of stories) {
    const sd = _dom.storyDoms.get(s.id);
    if (sd) updateStoryDom(sd, s, ctx);
  }
}

/* ── Story-level agent updates (5s poll, DOM only) ── */
function updateStoryAgent(d) {
  const a = d && d.active;
  const storyMap = a && a.stories ? a.stories : {};
  const activeIds = new Set(Object.keys(storyMap).map(Number));
  // Fallback: if no stories map but single storyId, use that
  if (activeIds.size === 0 && a && a.storyId) activeIds.add(a.storyId);

  document.querySelectorAll('[data-story-indicators]').forEach(el => {
    const sid = parseInt(el.dataset.storyIndicators);
    const existing = el.querySelector('.ind-live');
    const isLive = activeIds.has(sid);
    if (isLive && !existing) {
      const badge = cel('span', 'ind ind-live', 'Live');
      el.prepend(badge);
      const row = el.closest('.story-row');
      if (row && !row.onclick) row.setAttribute('onclick', 'togDetail(this)');
    } else if (!isLive && existing) {
      existing.remove();
    }
  });
  // Pulse animation on live story rows
  document.querySelectorAll('.story-row').forEach(row => {
    const idEl = row.querySelector('.s-id');
    if (!idEl) return;
    const sid = parseInt(idEl.textContent.replace('#', ''));
    if (activeIds.has(sid)) {
      row.classList.add('story-live');
    } else {
      row.classList.remove('story-live');
    }
  });
  document.querySelectorAll('[data-story-agent]').forEach(el => {
    const sid = parseInt(el.dataset.storyAgent);
    const ss = storyMap[String(sid)];
    if (ss) {
      el.style.display = '';
      el.querySelector('.agent-txt').textContent = (ss.step || '') + (ss.detail ? ' \u2014 ' + ss.detail : '');
      el.querySelector('.agent-ts').textContent = AGO(ss.updatedAt);
    } else if (a && a.storyId === sid) {
      el.style.display = '';
      el.querySelector('.agent-txt').textContent = (a.step || '') + (a.detail ? ' \u2014 ' + a.detail : '');
      el.querySelector('.agent-ts').textContent = AGO(a.updatedAt);
    } else {
      el.style.display = 'none';
    }
  });
}

/* ── Daily Feed (DOM-based) ── */
function buildDailyDOM(el, days) {
  while (el.firstChild) el.removeChild(el.firstChild);
  if (!Object.keys(days).length) {
    el.appendChild(cel('div', 'empty', 'Ingen aktivitet endnu'));
    return;
  }
  for (const [day, items] of Object.entries(days)) {
    const group = cel('div', 'day-group');
    group.appendChild(cel('div', 'day-date', day));
    const show = items.slice(0, 12);
    for (const i of show) {
      const row = cel('div', 'day-item');
      row.appendChild(cel('span', 'day-tag tag-' + i.type, i.type));
      row.appendChild(cel('span', 'day-text', i.text));
      group.appendChild(row);
    }
    if (items.length > 12) {
      const row = cel('div', 'day-item');
      row.style.opacity = '0.4';
      row.appendChild(cel('span', 'day-tag tag-task', '+' + (items.length - 12)));
      row.appendChild(cel('span', 'day-text', 'mere'));
      group.appendChild(row);
    }
    el.appendChild(group);
  }
}

function renderDaily() {
  const el = document.getElementById('daily'), entries = [];

  if (S.sprint && S.sprint.items) for (const i of S.sprint.items) {
    const d = i.changedDate || i.createdDate;
    if (d) entries.push({ date: d, type: i.type === 'Task' ? 'task' : 'story', text: '#' + i.id + ' ' + i.title + ' \u2014 ' + i.state });
  }
  for (const r of (S.git || [])) for (const c of (r.commits || [])) entries.push({ date: c.date, type: 'commit', text: r.repoName + ': ' + c.subject });
  if (S.exec && S.exec.executions) for (const x of S.exec.executions) {
    entries.push({ date: x.completedAt, type: 'exec', text: '#' + x.storyId + ' ' + x.storyTitle + ' \u2014 ' + x.status });
    if (x.prUrl) entries.push({ date: x.completedAt, type: 'pr', text: 'PR: ' + x.storyTitle });
  }

  entries.sort((a, b) => new Date(b.date) - new Date(a.date));
  const days = {};
  for (const e of entries) { const d = new Date(e.date).toLocaleDateString('da-DK', { weekday: 'long', day: 'numeric', month: 'short' }); (days[d] = days[d] || []).push(e); }

  const key = JSON.stringify(days);
  if (key !== _dom.dailyKey) {
    _dom.dailyKey = key;
    buildDailyDOM(el, days);
  }
}

/* ── Data Loading ── */
let _lastDataKey = '';
async function refreshAll() {
  await Promise.all([
    F('/api/sprint').then(d => S.sprint = d).catch(() => {}),
    F('/api/pr-status').then(d => S.pr = d).catch(() => S.pr = []),
    F('/api/git-activity').then(d => S.git = d).catch(() => S.git = []),
    F('/api/execution-log').then(d => S.exec = d).catch(() => {}),
    F('/api/task-map').then(d => S.map = d).catch(() => {}),
    F('/api/agent-status').then(d => { S.agent = d; renderAgent(d); }).catch(() => renderAgent(null)),
  ]);
  const key = JSON.stringify([S.sprint, S.pr, S.git, S.exec, S.map]);
  if (key !== _lastDataKey) { _lastDataKey = key; renderMain(); renderDaily(); }
}

refreshAll();
setInterval(() => F('/api/agent-status').then(d => { S.agent = d; renderAgent(d); updateStoryAgent(d); }).catch(() => renderAgent(null)), 5000);
setInterval(refreshAll, 60000);
</script>
